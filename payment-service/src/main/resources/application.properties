spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_payment_db
spring.datasource.username=postgres
spring.datasource.password=Dhrumil2006
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8083

spring.application.name=payment-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.config.import=optional:configserver:http://localhost:8888

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Disable strict default types and use type headers for multi-event parsing
# spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.paymentservice.event.InventoryReservedEvent
# spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.properties.spring.json.type.mapping=inventoryReservedEvent:com.ecommerce.paymentservice.event.InventoryReservedEvent
spring.kafka.producer.properties.spring.json.type.mapping=paymentCompletedEvent:com.ecommerce.paymentservice.event.PaymentCompletedEvent,paymentFailedEvent:com.ecommerce.paymentservice.event.PaymentFailedEvent

# Distributed Tracing & Zipkin Configuration
management.endpoints.web.exposure.include=*
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
spring.zipkin.base-url=http://localhost:9411/
spring.zipkin.baseUrl=http://localhost:9411/

# Enable Kafka Tracing Observation Propagation
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

# Logging Pattern with Trace ID and Span ID
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

