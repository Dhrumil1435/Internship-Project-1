server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.server.webmvc.routes[0].id=order-service-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webmvc.routes[1].id=inventory-service-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/inventory/**

spring.cloud.gateway.server.webmvc.routes[2].id=payment-service-route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://payment-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/payments/**