server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.server.webmvc.routes[0].id=order-service-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/orders/**